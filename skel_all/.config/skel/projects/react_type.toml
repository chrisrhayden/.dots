dirs = [ "src", "dist" ]

build = """
yarn init -y
yarn add \
    'typescript' \
    '@types/node' \
    'eslint' \
    '@typescript-eslint/parser' \
    '@typescript-eslint/eslint-plugin' \
    'react' \
    'react-dom' \
    '@types/react' \
    '@types/react-dom'

git init
"""

[[templates]]
path = "src/main.ts"
include = "{{config-dir}}/projects/basic_typescript/main.ts"

[[templates]]
path  = ".eslintrc.json"
include = "{{config-dir}}/projects/basic_typescript/typescript.eslintrc.json"

[[templates]]
path = ".gitignore"
include = "{{config-dir}}/projects/basic_typescript/typescript.gitignore"

[[templates]]
path = "tsconfig.json"
template = """
{
    "compilerOptions": {
        "outDir": "./dist"
    },
    "include": [
        "./src"
    ],
    "exclude": [
        ".git",
        "node_modules"
    ]
}
"""
